rs_dragonwilds_install_dir: '{{ [rs_dragonwilds_user_home, "server"] | path_join }}'

rs_dragonwilds_systemd_service: rsdw
rs_dragonwilds_service_enabled: true
rs_dragonwilds_service_started: true

rs_dragonwilds_steam_appid: "4019830"

